# GCP ML Framework — project configuration
# This file is the single source of truth for team/project identity.
# Commit it. Never put secrets here — use GCP Secret Manager (!secret key-name).

team: dsci
project: examplechurn

gcp:
  # Replace these with your actual GCP project IDs.
  dev_project_id: gcp-gap-demo-dev
  staging_project_id: gcp-gap-demo-staging
  prod_project_id: gcp-gap-demo-prod
  region: us-central1
  composer_dags_path:
    dev: "gs://us-central1-dsci-examplechu-8f740abc-bucket/dags"
    staging: ""
    prod: ""
  artifact_registry_host: us-central1-docker.pkg.dev
secrets:
  # Secrets are referenced in config/pipeline code as: !secret <key-name>
  # They are resolved at runtime from GCP Secret Manager.
  # The full secret name will be: {namespace}-{key-name}
  # e.g. dsci-example-churn-main-db-password
  secret_prefix:    # leave blank to default to the namespace token
