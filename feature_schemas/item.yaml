entity: item
id_column: item_id
id_type: STRING
description: "Catalogue item entity — product and engagement features"
feature_groups:
  catalog:
    description: "Static product catalogue attributes"
    features:
      - name: category
        type: STRING
        description: "Top-level product category"
      - name: price_usd
        type: FLOAT64
        description: "Listed price in USD"
      - name: stock_count
        type: INT64
        description: "Current inventory stock count"
  engagement:
    description: "Item engagement metrics (rolling windows)"
    features:
      - name: view_count_7d
        type: INT64
        description: "Number of item views in the last 7 days"
      - name: purchase_count_30d
        type: INT64
        description: "Number of purchases in the last 30 days"
      - name: conversion_rate_30d
        type: FLOAT64
        description: "View-to-purchase conversion rate (30d)"
