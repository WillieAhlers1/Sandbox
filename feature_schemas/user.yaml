entity: user
id_column: user_id
id_type: STRING
description: "Platform user entity — behavioural and demographic features"
feature_groups:
  behavioral:
    description: "Engagement and activity signals"
    features:
      - name: session_count_7d
        type: INT64
        description: "Number of sessions in the last 7 days"
      - name: session_count_30d
        type: INT64
        description: "Number of sessions in the last 30 days"
      - name: total_purchases_30d
        type: FLOAT64
        description: "Total purchase value (USD) in the last 30 days"
      - name: days_since_last_login
        type: INT64
        description: "Days elapsed since the user's last login"
      - name: support_tickets_90d
        type: INT64
        description: "Number of support tickets raised in the last 90 days"
      - name: avg_session_duration_s
        type: FLOAT64
        description: "Average session duration in seconds (7d window)"
  demographic:
    description: "User demographic attributes"
    features:
      - name: country
        type: STRING
        description: "ISO 3166-1 alpha-2 country code"
      - name: account_age_days
        type: INT64
        description: "Days since account creation"
      - name: is_premium
        type: BOOL
        description: "Whether the user has an active premium subscription"
